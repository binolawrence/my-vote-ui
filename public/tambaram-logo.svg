<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="58" fill="#0ea5e9" stroke="#0f172a" stroke-width="2"/>
  
  <!-- Inner circle -->
  <circle cx="60" cy="60" r="52" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  
  <!-- Decorative rings -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#0f172a" stroke-width="1"/>
  <circle cx="60" cy="60" r="44" fill="none" stroke="#0ea5e9" stroke-width="0.8"/>
  
  <!-- Inner emblem with T and A -->
  <g text-anchor="middle" dominant-baseline="middle">
    <!-- Main text -->
    <text x="60" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#0f172a">TA</text>
    
    <!-- Tambaram text below -->
    <text x="60" y="80" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#0f172a" letter-spacing="1">TAMBARAM</text>
  </g>
  
  <!-- Small decorative stars/elements at cardinal points -->
  <circle cx="60" cy="18" r="2" fill="#0f172a"/>
  <circle cx="102" cy="60" r="2" fill="#0f172a"/>
  <circle cx="60" cy="102" r="2" fill="#0f172a"/>
  <circle cx="18" cy="60" r="2" fill="#0f172a"/>
</svg>